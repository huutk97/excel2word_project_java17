name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      # 👇 Java 17 để build project
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build jar
        run: mvn clean package

      # 👇 Cài Java 8 cho Launch4j
      - name: Install Java 8
        run: choco install temurin8 -y

      # 👇 Set JAVA_HOME sang Java 8 (cho Launch4j)
      - name: Set JAVA_HOME to Java 8
        run: |
          echo "JAVA_HOME=C:\Program Files\Eclipse Adoptium\jdk-8*" >> $env:GITHUB_ENV

      # 👇 Cài Launch4j
      - name: Install Launch4j
        run: choco install launch4j -y

      # 👇 Build exe
      - name: Build exe
        run: |
          & "C:\Program Files (x86)\Launch4j\launch4jc.exe" config.xml